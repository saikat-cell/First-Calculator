    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MY Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="Calculator ">
            <input type="text" placeholder="0" class="display" readonly>
            <div>
                <button class="ope" data-value="AC">Ac</button>
                <button class="ope" data-value="DEL">DEL</button>
                <button class="ope" data-value="%">%</button>
                <button class="ope" data-value="/"  >/</button>
            </div>
            <div>
                <button data-value="7">7</button>
                <button data-value="8">8</button>
                <button data-value="9">9</button>
                <button class="ope" data-value="*">*</button>
            </div>
            <div>
                <button data-value="4">4</button>
                <button data-value="5">5</button>
                <button data-value="6">6</button>
                <button class="ope" data-value="-">-</button>
            </div>
            <div>
                <button data-value="1">1</button>
                <button data-value="2">2</button>
                <button data-value="3">3</button>
                <button class="ope" data-value="+">+</button>
            </div>
            <div>
                <button data-value="00">00</button>
                <button data-value="0">0</button>
                <button data-value=".">.</button>
                <button class="equal" data-value="=">=</button>
            </div>
        </div>
        <script>
            const display = document.querySelector(".display");
            const buttons = document.querySelectorAll("button");
            let expression = "";
            buttons.forEach((button)=>{
                button.addEventListener("click",()=>{
                    const val= button.dataset.value;
                    if(val==="AC")  {
                        expression="";
                    }else if(val==="DEL"){
                       expression =  expression.slice(0,-1);
                    }else if(val==="="){
                        if(expression==="") return; 
                        try{
                            expression = eval(expression).toString();
                        }catch{
                            expression = "Error";
                        }
                    }else{
                        expression += val; 
                    }
                    display.value=expression;
                })
            })
        </script>
    </body>
    </html>
